<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>byScript Academy — Algorithmic Trading Mastery</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0c0f;--bg-1:#0f1215;--bg-2:#141820;--bg-3:#1a1f28;--bg-4:#202633;
  --border:rgba(255,255,255,0.06);--border-2:rgba(255,255,255,0.10);
  --text-1:#f0f2f5;--text-2:#8b95a8;--text-3:#556070;
  --accent:#22c55e;--accent-dim:rgba(34,197,94,0.12);--accent-border:rgba(34,197,94,0.25);
  --sidebar-w:280px;--radius:10px;--radius-lg:14px;
  font-family:'DM Sans',sans-serif;
}
html{font-size:15px;scroll-behavior:smooth}
body{background:var(--bg);color:var(--text-1);min-height:100vh;line-height:1.6;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit}
input{font-family:inherit}
.app-layout{display:flex;min-height:100vh;position:relative}
.sidebar-wrapper{width:var(--sidebar-w);min-height:100vh;flex-shrink:0}
.main-wrapper{flex:1;min-width:0;display:flex;flex-direction:column}
.page-content{flex:1;padding:0}
.sidebar{width:var(--sidebar-w);height:100vh;background:var(--bg-1);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;position:fixed;top:0;left:0}
.sidebar-brand{display:flex;align-items:center;gap:12px;padding:20px 18px 16px;border-bottom:1px solid var(--border);flex-shrink:0;cursor:pointer}
.brand-icon{width:36px;height:36px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:11px;color:#000;flex-shrink:0}
.brand-name{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;color:var(--text-1);line-height:1.2}
.brand-sub{font-size:11px;color:var(--text-3);letter-spacing:.04em;text-transform:uppercase}
.sidebar-search{margin:12px 12px 8px;position:relative;flex-shrink:0}
.search-icon-wrap{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-3);pointer-events:none;display:flex}
.search-input{width:100%;background:var(--bg-2);border:1px solid var(--border);border-radius:7px;padding:8px 32px 8px 32px;font-size:12.5px;color:var(--text-1);outline:none;transition:border-color .2s}
.search-input::placeholder{color:var(--text-3)}
.search-input:focus{border-color:var(--accent-border)}
.search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--text-3);display:flex;transition:color .2s}
.search-clear:hover{color:var(--text-1)}
.sidebar-section-label{padding:8px 18px 6px;font-size:10.5px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);flex-shrink:0}
.sidebar-nav{flex:1;overflow-y:auto;padding:4px 8px 8px;scrollbar-width:thin;scrollbar-color:var(--bg-4) transparent}
.sidebar-nav::-webkit-scrollbar{width:4px}
.sidebar-nav::-webkit-scrollbar-thumb{background:var(--bg-4);border-radius:2px}
.module-group{margin-bottom:2px}
.module-header{width:100%;display:flex;align-items:center;justify-content:space-between;padding:8px 8px 8px 10px;border-radius:7px;text-align:left;transition:background .15s;gap:8px}
.module-header:hover{background:var(--bg-3)}
.module-header-left{display:flex;align-items:flex-start;gap:6px;flex:1;min-width:0}
.chevron-icon{color:var(--text-3);flex-shrink:0;margin-top:3px}
.module-label{font-size:9.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);line-height:1.2}
.module-title-sb{font-size:12px;font-weight:500;color:var(--text-2);line-height:1.35;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:170px}
.module-progress-pill{font-size:10px;font-weight:600;color:var(--text-3);background:var(--bg-3);border:1px solid var(--border);border-radius:100px;padding:1px 7px;flex-shrink:0}
.coming-soon-badge{font-size:9.5px;color:var(--text-3);background:var(--bg-3);border:1px solid var(--border);border-radius:100px;padding:1px 7px;flex-shrink:0}
.lessons-list{padding:2px 0 4px 18px;display:flex;flex-direction:column;gap:1px}
.lesson-item{width:100%;display:flex;align-items:flex-start;gap:8px;padding:7px 8px;border-radius:6px;text-align:left;transition:background .15s;border:1px solid transparent}
.lesson-item:hover{background:var(--bg-3)}
.lesson-item--active{background:var(--accent-dim)!important;border-color:var(--accent-border)}
.lesson-item-check{flex-shrink:0;padding-top:2px}
.check-done{color:var(--accent)}
.check-empty{color:var(--text-3)}
.lesson-item-content{flex:1;min-width:0}
.lesson-item-id{font-size:9.5px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em;line-height:1.2}
.lesson-item-title{font-size:12px;font-weight:500;color:var(--text-2);line-height:1.35;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.lesson-item--active .lesson-item-title{color:var(--text-1)}
.lesson-item--done .lesson-item-title{color:var(--text-3)}
.lesson-item-duration{font-size:10.5px;color:var(--text-3);margin-top:2px}
.sidebar-footer{display:flex;align-items:center;gap:6px;padding:12px 18px;border-top:1px solid var(--border);font-size:11.5px;color:var(--text-3);flex-shrink:0}
.mobile-header{display:none;align-items:center;gap:12px;padding:12px 16px;background:var(--bg-1);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50}
.mobile-menu-btn{color:var(--text-2);display:flex;padding:4px;transition:color .2s}
.mobile-brand{font-family:'Syne',sans-serif;font-weight:700;font-size:16px;color:var(--text-1)}
.mobile-brand span{color:var(--text-3)}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:90}
.dashboard{max-width:1000px;margin:0 auto;padding:40px 32px 80px}
.dashboard-hero{margin-bottom:32px}
.hero-eyebrow{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.eyebrow-badge{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);background:var(--accent-dim);border:1px solid var(--accent-border);border-radius:100px;padding:3px 10px}
.eyebrow-level{font-size:12px;color:var(--text-3)}
.hero-title{font-family:'Syne',sans-serif;font-size:clamp(26px,4vw,36px);font-weight:800;color:var(--text-1);line-height:1.15;margin-bottom:12px;letter-spacing:-.02em}
.hero-desc{font-size:15px;color:var(--text-2);max-width:580px;line-height:1.65;margin-bottom:24px}
.hero-actions{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.btn-primary{display:inline-flex;align-items:center;gap:8px;background:var(--accent);color:#000;font-family:'DM Sans',sans-serif;font-weight:600;font-size:14px;padding:10px 20px;border-radius:8px;border:none;cursor:pointer;transition:opacity .15s,transform .15s}
.btn-primary:hover{opacity:.88;transform:translateY(-1px)}
.hero-resume-label{font-size:13px;color:var(--text-3);max-width:280px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stats-bar{display:flex;align-items:center;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 20px;margin-bottom:28px;flex-wrap:wrap;gap:16px}
.stat-item{display:flex;align-items:center;gap:10px}
.stat-icon{color:var(--accent)}
.stat-value{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:var(--text-1);line-height:1}
.stat-label{font-size:11px;color:var(--text-3);margin-top:2px}
.stat-divider{width:1px;height:36px;background:var(--border)}
.stats-progress{flex:1;min-width:120px}
.stats-progress-bar{height:6px;background:var(--bg-4);border-radius:100px;overflow:hidden}
.stats-progress-fill{height:100%;background:var(--accent);border-radius:100px;transition:width .5s ease}
.dashboard-search-section{margin-bottom:32px}
.dashboard-search-wrap{position:relative;max-width:520px}
.dsearch-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-3);pointer-events:none;display:flex}
.dsearch-input{width:100%;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 40px 12px 42px;font-size:14px;color:var(--text-1);outline:none;transition:border-color .2s}
.dsearch-input::placeholder{color:var(--text-3)}
.dsearch-input:focus{border-color:var(--accent-border)}
.dsearch-clear{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--text-3);transition:color .15s;display:flex}
.section-header{display:flex;align-items:baseline;gap:10px;margin-bottom:20px}
.section-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:var(--text-1);letter-spacing:-.01em}
.section-sub{font-size:12px;color:var(--text-3)}
.results-count{font-size:14px;color:var(--text-3);font-weight:400}
.search-results-section{margin-bottom:40px}
.search-results-list{display:flex;flex-direction:column;gap:4px}
.search-result-item{display:flex;align-items:center;gap:14px;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;text-align:left;transition:border-color .15s,background .15s;width:100%}
.search-result-item:hover{border-color:var(--border-2);background:var(--bg-3)}
.sresult-id{font-size:10px;font-weight:700;color:var(--accent);background:var(--accent-dim);border-radius:4px;padding:2px 7px;flex-shrink:0;letter-spacing:.05em}
.sresult-content{flex:1;min-width:0}
.sresult-title{font-weight:500;font-size:14px;color:var(--text-1)}
.sresult-meta{font-size:12px;color:var(--text-3);margin-top:2px}
.empty-state{display:flex;flex-direction:column;align-items:center;gap:12px;padding:48px;color:var(--text-3);font-size:14px}
.modules-section{margin-bottom:40px}
.module-cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.module-card{background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;cursor:pointer;transition:border-color .2s,transform .15s,background .2s;text-align:left;display:flex;flex-direction:column;gap:10px}
.module-card:hover:not(.module-card--locked){border-color:var(--border-2);background:var(--bg-3);transform:translateY(-2px)}
.module-card--locked{cursor:default;opacity:.6}
.mc-header{display:flex;align-items:center;justify-content:space-between}
.mc-id-badge{font-size:10px;font-weight:700;color:var(--accent);background:var(--accent-dim);border:1px solid var(--accent-border);border-radius:5px;padding:2px 8px;letter-spacing:.06em}
.mc-coming-soon{font-size:10.5px;color:var(--text-3);background:var(--bg-3);border:1px solid var(--border);border-radius:100px;padding:2px 8px}
.mc-complete-badge{display:flex;align-items:center;gap:4px;font-size:10.5px;color:var(--accent);background:var(--accent-dim);border-radius:100px;padding:2px 8px}
.mc-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--text-1);line-height:1.3;letter-spacing:-.01em}
.mc-overview{font-size:12.5px;color:var(--text-3);line-height:1.55}
.mc-stats{display:flex;gap:12px;flex-wrap:wrap}
.mc-stat{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-3)}
.mc-progress-bar{height:4px;background:var(--bg-4);border-radius:100px;overflow:hidden}
.mc-progress-fill{height:100%;background:var(--accent);border-radius:100px;transition:width .5s}
.mc-progress-label{font-size:11px;color:var(--text-3)}
.mc-cta{display:flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;color:var(--accent);margin-top:2px}
.outcomes-section{margin-bottom:40px}
.outcomes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px}
.outcome-item{display:flex;align-items:flex-start;gap:10px;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;font-size:13px;color:var(--text-2);line-height:1.5}
.outcome-check{color:var(--accent);font-weight:700;flex-shrink:0;font-size:13px}
.module-page{max-width:860px;margin:0 auto;padding:36px 32px 80px}
.breadcrumb{display:flex;align-items:center;gap:6px;margin-bottom:24px;flex-wrap:wrap}
.breadcrumb-link{font-size:12.5px;color:var(--text-3);transition:color .15s}
.breadcrumb-link:hover{color:var(--text-2)}
.bc-sep{color:var(--text-3);flex-shrink:0}
.breadcrumb-current{font-size:12.5px;color:var(--text-2);font-weight:500}
.module-hero{margin-bottom:32px}
.module-id-pill{display:inline-block;font-size:10px;font-weight:700;color:var(--accent);background:var(--accent-dim);border:1px solid var(--accent-border);border-radius:5px;padding:3px 10px;letter-spacing:.08em;margin-bottom:12px}
.module-page-title{font-family:'Syne',sans-serif;font-size:clamp(22px,3.5vw,30px);font-weight:800;color:var(--text-1);line-height:1.2;letter-spacing:-.02em;margin-bottom:12px}
.module-overview-text{font-size:14.5px;color:var(--text-2);line-height:1.65;max-width:640px;margin-bottom:18px}
.module-meta-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
.mod-meta-chip{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text-3);background:var(--bg-2);border:1px solid var(--border);border-radius:6px;padding:4px 10px}
.module-progress-section{max-width:480px}
.mp-bar-wrap{display:flex;align-items:center;gap:10px}
.mp-bar{flex:1;height:6px;background:var(--bg-4);border-radius:100px;overflow:hidden}
.mp-bar-fill{height:100%;background:var(--accent);border-radius:100px;transition:width .5s}
.mp-percent{font-size:12px;font-weight:600;color:var(--accent);min-width:36px;text-align:right}
.module-outcomes{background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:28px}
.outcomes-header{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.outcomes-icon{color:var(--accent)}
.outcomes-header h2{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--text-1)}
.outcomes-list{display:flex;flex-direction:column;gap:10px}
.outcome-row{display:flex;align-items:flex-start;gap:12px}
.outcome-number{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--accent);flex-shrink:0;min-width:24px;margin-top:1px}
.outcome-row p{font-size:13.5px;color:var(--text-2);line-height:1.55}
.lessons-section-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:var(--text-1);margin-bottom:16px}
.module-lessons-list{display:flex;flex-direction:column;gap:8px}
.module-lesson-card{display:flex;align-items:center;gap:16px;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;text-align:left;cursor:pointer;transition:border-color .2s,background .2s,transform .15s;width:100%}
.module-lesson-card:hover{border-color:var(--border-2);background:var(--bg-3);transform:translateY(-1px)}
.mlc--done{opacity:.7}
.mlc-number{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:var(--bg-4);min-width:36px;flex-shrink:0}
.mlc-icon{flex-shrink:0}
.mlc-done-icon{color:var(--accent)}
.mlc-play-btn{width:36px;height:36px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#000;transition:transform .15s}
.module-lesson-card:hover .mlc-play-btn{transform:scale(1.1)}
.mlc-content{flex:1;min-width:0}
.mlc-id{font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px}
.mlc-title{font-size:15px;font-weight:600;color:var(--text-1);margin-bottom:4px;line-height:1.3}
.mlc-summary-text{font-size:12.5px;color:var(--text-3);line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.mlc-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0}
.mlc-duration{font-size:12px;color:var(--text-3);white-space:nowrap}
.lesson-page{max-width:860px;margin:0 auto;padding:36px 32px 80px}
.lesson-header{margin-bottom:20px}
.lesson-id-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.lesson-module-badge,.lesson-video-badge{font-size:10px;font-weight:700;letter-spacing:.06em;border-radius:5px;padding:3px 8px}
.lesson-module-badge{color:var(--accent);background:var(--accent-dim);border:1px solid var(--accent-border)}
.lesson-video-badge{color:var(--text-3);background:var(--bg-3);border:1px solid var(--border)}
.lesson-done-badge{display:flex;align-items:center;gap:4px;font-size:10px;font-weight:600;color:var(--accent);background:var(--accent-dim);border:1px solid var(--accent-border);border-radius:100px;padding:3px 9px}
.lesson-title{font-family:'Syne',sans-serif;font-size:clamp(20px,3vw,26px);font-weight:800;color:var(--text-1);line-height:1.2;letter-spacing:-.02em;margin-bottom:12px}
.lesson-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.lmeta-chip{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text-3);background:var(--bg-2);border:1px solid var(--border);border-radius:6px;padding:5px 10px}
.lmeta-link{transition:color .15s,border-color .15s}
.lmeta-link:hover{color:var(--text-2);border-color:var(--border-2)}
.video-container{position:relative;width:100%;padding-bottom:56.25%;background:var(--bg-2);border-radius:var(--radius-lg);overflow:hidden;border:1px solid var(--border);margin-bottom:16px}
.video-iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
.lesson-complete-row{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:24px}
.mark-complete-btn{display:flex;align-items:center;gap:8px;font-size:13.5px;font-weight:600;padding:9px 16px;border-radius:8px;border:1px solid var(--border);background:var(--bg-2);color:var(--text-2);transition:all .2s}
.mark-complete-btn:hover{border-color:var(--accent-border);color:var(--accent);background:var(--accent-dim)}
.mark-complete-btn--done{background:var(--accent-dim);border-color:var(--accent-border);color:var(--accent)}
.lesson-nav-inline{display:flex;gap:8px}
.nav-inline-btn{display:flex;align-items:center;gap:5px;font-size:13px;font-weight:500;color:var(--text-3);padding:8px 12px;border-radius:7px;border:1px solid var(--border);background:var(--bg-2);transition:all .15s}
.nav-inline-btn:hover{color:var(--text-1);border-color:var(--border-2)}
.nav-inline-btn--next{color:var(--accent);border-color:var(--accent-border);background:var(--accent-dim)}
.content-tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:24px;overflow-x:auto;scrollbar-width:none}
.content-tabs::-webkit-scrollbar{display:none}
.content-tab{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;color:var(--text-3);padding:10px 14px;border-radius:8px 8px 0 0;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.content-tab:hover{color:var(--text-2)}
.content-tab--active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-panel{display:flex;flex-direction:column;gap:24px}
.content-block{background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px 22px}
.content-block-title{display:flex;align-items:center;gap:8px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--accent);margin-bottom:14px}
.lesson-summary-text{font-size:14.5px;color:var(--text-2);line-height:1.7;font-style:italic}
.lesson-description-text{font-size:14px;color:var(--text-2);line-height:1.7}
.takeaways-list{list-style:none;display:flex;flex-direction:column;gap:10px}

// ── Icons (using lucide) ────────────────────────────────────────────────
function Icon({ name, size = 16, className = "", style = {} }) {
  const el = React.useRef(null);
  React.useEffect(() => {
    if (el.current && window.lucide) {
      el.current.innerHTML = '';
      const svg = window.lucide.createElement(name);
      if (svg) {
        svg.setAttribute('width', size);
        svg.setAttribute('height', size);
        svg.setAttribute('stroke-width', '1.75');
        el.current.appendChild(svg);
      }
    }
  }, [name, size]);
  return <span ref={el} className={className} style={{ display:'inline-flex', alignItems:'center', ...style }} />;
}

// ── Progress Hook ───────────────────────────────────────────────────────
function useProgress(data) {
  const [progress, setProgress] = useState(() => {
    try { const r = localStorage.getItem('bs_prog_v1'); return r ? JSON.parse(r) : {}; } catch { return {}; }
  });
  const save = (p) => { try { localStorage.setItem('bs_prog_v1', JSON.stringify(p)); } catch {} };
  const markComplete = useCallback((id) => setProgress(prev => { const n = {...prev,[id]:true}; save(n); return n; }), []);
  const markIncomplete = useCallback((id) => setProgress(prev => { const n={...prev}; delete n[id]; save(n); return n; }), []);
  const isComplete = useCallback((id) => !!progress[id], [progress]);
  const allLessons = data.modules.flatMap(m => m.lessons);
  const totalLessons = allLessons.length;
  const completedCount = allLessons.filter(l => progress[l.id]).length;
  const overallPercent = totalLessons > 0 ? Math.round(completedCount / totalLessons * 100) : 0;
  const moduleStats = data.modules.map(m => { const t = m.lessons.length; const c = m.lessons.filter(l => progress[l.id]).length; return {moduleId:m.id,total:t,completed:c,percent:t>0?Math.round(c/t*100):0}; });
  const nextLesson = allLessons.find(l => !progress[l.id]) || null;
  return {markComplete,markIncomplete,isComplete,totalLessons,completedCount,overallPercent,moduleStats,nextLesson};
}

}

// ── Dashboard ─────────────────────────────────────────────────────────────
function Dashboard({courseData,overallPercent,completedCount,totalLessons,moduleStats,nextLesson,onNavigate,searchQuery,onSearchChange}) {
  const allLessons = courseData.modules.flatMap(m => m.lessons.map(l=>({...l,moduleTitle:m.title})));
  const filtered = searchQuery ? allLessons.filter(l => l.title.toLowerCase().includes(searchQuery.toLowerCase()) || (l.summary||'').toLowerCase().includes(searchQuery.toLowerCase())) : [];
  return (
    <main className="dashboard">
      <section className="dashboard-hero">
        <div className="hero-eyebrow">
          <span className="eyebrow-badge">byScript Academy</span>
          <span className="eyebrow-level">{courseData.level}</span>
        </div>
        <h1 className="hero-title">{courseData.title}</h1>
        <p className="hero-desc">{courseData.subtitle}</p>
        <div className="hero-actions">
          {nextLesson ? (
            <button className="btn-primary" onClick={()=>onNavigate('lesson',nextLesson.id)}>
              <Icon name="Play" size={15}/>{completedCount===0?'Start Learning':'Continue Learning'}
            </button>
          ) : (
            <div className="btn-primary" style={{background:'var(--bg-3)',color:'var(--accent)',border:'1px solid var(--accent-border)'}}>
              <Icon name="Trophy" size={15}/>Course Complete!
            </div>
          )}
          {nextLesson && completedCount > 0 && <span className="hero-resume-label">Resume: {nextLesson.title}</span>}
        </div>
      </section>

      <section className="stats-bar">
        {[
          {icon:'BarChart2',value:`${overallPercent}%`,label:'Complete'},
          {icon:'BookOpen',value:`${completedCount}/${totalLessons}`,label:'Lessons Done'},
          {icon:'Clock',value:courseData.estimatedHours,label:'Total Content'},
          {icon:'Trophy',value:courseData.totalModules,label:'Modules'},
        ].map((s,i,arr) => (
          <React.Fragment key={i}>
            <div className="stat-item">
              <span className="stat-icon"><Icon name={s.icon} size={18}/></span>
              <div><div className="stat-value">{s.value}</div><div className="stat-label">{s.label}</div></div>
            </div>
            {i < arr.length-1 && <div className="stat-divider"/>}
          </React.Fragment>
        ))}
        <div className="stats-progress">
          <div className="stats-progress-bar"><div className="stats-progress-fill" style={{width:`${overallPercent}%`}}/></div>
        </div>
      </section>

      <section className="dashboard-search-section">
        <div className="dashboard-search-wrap">
          <span className="dsearch-icon"><Icon name="Search" size={16}/></span>
          <input type="text" placeholder="Search all lessons by title or keyword..." value={searchQuery} onChange={e=>onSearchChange(e.target.value)} className="dsearch-input"/>
          {searchQuery && <button onClick={()=>onSearchChange('')} className="dsearch-clear"><Icon name="X" size={14}/></button>}
        </div>
      </section>

      {searchQuery && (
        <section className="search-results-section">
          <div className="section-header"><h2 className="section-title">Search Results <span className="results-count">({filtered.length})</span></h2></div>
          {filtered.length === 0 ? (
            <div className="empty-state"><Icon name="Search" size={32}/><p>No lessons match "{searchQuery}"</p></div>
          ) : (
            <div className="search-results-list">
              {filtered.map(l => (
                <button key={l.id} className="search-result-item" onClick={()=>onNavigate('lesson',l.id)}>
                  <span className="sresult-id">{l.id}</span>
                  <div className="sresult-content"><div className="sresult-title">{l.title}</div><div className="sresult-meta">{l.moduleTitle} · {l.duration}</div></div>
                  <Icon name="ArrowRight" size={16}/>
                </button>
              ))}
            </div>
          )}
        </section>
      )}

      {!searchQuery && (
        <section className="modules-section">
          <div className="section-header"><h2 className="section-title">Course Modules</h2><span className="section-sub">{courseData.totalModules} modules</span></div>
          <div className="module-cards-grid">
            {courseData.modules.map((module,idx) => {
              const stats = moduleStats[idx];
              const isLocked = module.lessons.length === 0;
              return (
                <div key={module.id} className={`module-card ${isLocked?'module-card--locked':''}`} onClick={()=>!isLocked&&onNavigate('module',module.id)} tabIndex={isLocked?-1:0} role={isLocked?undefined:"button"}>
                  <div className="mc-header">
                    <span className="mc-id-badge">{module.id}</span>
                    {isLocked && <span className="mc-coming-soon">Coming Soon</span>}
                    {!isLocked && stats.completed===stats.total && stats.total>0 && <span className="mc-complete-badge"><Icon name="Trophy" size={11}/>Complete</span>}
                  </div>
                  <h3 className="mc-title">{module.title}</h3>
                  <p className="mc-overview">{module.overview.slice(0,120)}...</p>
                  <div className="mc-stats">
                    <span className="mc-stat"><Icon name="Clock" size={12}/>{module.total_duration}</span>
                    {!isLocked && <span className="mc-stat"><Icon name="BookOpen" size={12}/>{module.lessons.length} lessons</span>}
                  </div>
                  {!isLocked && (
                    <>
                      <div className="mc-progress-bar"><div className="mc-progress-fill" style={{width:`${stats.percent}%`}}/></div>
                      <div className="mc-progress-label">{stats.completed}/{stats.total} lessons · {stats.percent}%</div>
                      <div className="mc-cta"><span>{stats.completed===0?'Start Module':'Continue'}</span><Icon name="ArrowRight" size={14}/></div>
                    </>
                  )}
                </div>
              );
            })}
          </div>
        </section>
      )}

      {!searchQuery && (
        <section className="outcomes-section">
          <div className="section-header"><h2 className="section-title">What You'll Learn</h2></div>
          <div className="outcomes-grid">
            {courseData.modules.flatMap(m=>m.learning_outcomes).slice(0,8).map((o,i)=>(
              <div key={i} className="outcome-item"><div className="outcome-check">✓</div><span>{o}</span></div>
            ))}
          </div>
        </section>
      )}
    </main>
  );
}

// ── Module Page ─────────────────────────────────────────────────────────
function ModulePage({module,moduleStats,isComplete,onNavigate}) {
  if (!module) return null;
  return (
    <main className="module-page">
      <div className="breadcrumb">
        <button className="breadcrumb-link" onClick={()=>onNavigate('dashboard')}>Course Home</button>
        <span className="bc-sep"><Icon name="ChevronRight" size={14}/></span>
        <span className="breadcrumb-current">{module.id}</span>
      </div>
      <section className="module-hero">
        <div className="module-id-pill">{module.id}</div>
        <h1 className="module-page-title">{module.title}</h1>
        <p className="module-overview-text">{module.overview}</p>
        <div className="module-meta-row">
          {[{icon:'Clock',text:module.total_duration},{icon:'BookOpen',text:`${module.lessons.length} lessons`},{icon:'CheckCircle',text:`${moduleStats.completed}/${moduleStats.total} done`}].map((c,i)=>(
            <span key={i} className="mod-meta-chip"><Icon name={c.icon} size={13}/>{c.text}</span>
          ))}
        </div>
        <div className="module-progress-section">
          <div className="mp-bar-wrap">
            <div className="mp-bar"><div className="mp-bar-fill" style={{width:`${moduleStats.percent}%`}}/></div>
            <span className="mp-percent">{moduleStats.percent}%</span>
          </div>
        </div>
      </section>
      <section className="module-outcomes">
        <div className="outcomes-header"><span className="outcomes-icon"><Icon name="Target" size={16}/></span><h2>Learning Outcomes</h2></div>
        <div className="outcomes-list">
          {module.learning_outcomes.map((o,i)=>(
            <div key={i} className="outcome-row">
              <div className="outcome-number">{String(i+1).padStart(2,'0')}</div>
              <p>{o}</p>
            </div>
          ))}
        </div>
      </section>
      <section>
        <h2 className="lessons-section-title">Lessons</h2>
        <div className="module-lessons-list">
          {module.lessons.map((lesson,idx)=>{
            const done = isComplete(lesson.id);
            return (
              <button key={lesson.id} className={`module-lesson-card ${done?'mlc--done':''}`} onClick={()=>onNavigate('lesson',lesson.id)}>
                <div className="mlc-number">{String(idx+1).padStart(2,'0')}</div>
                <div className="mlc-icon">
                  {done ? <span className="mlc-done-icon"><Icon name="CheckCircle" size={20}/></span> : <div className="mlc-play-btn"><Icon name="Play" size={14}/></div>}
                </div>
                <div className="mlc-content">
                  <div className="mlc-id">{lesson.id}</div>
                  <div className="mlc-title">{lesson.title}</div>
                  <div className="mlc-summary-text">{lesson.summary}</div>
                </div>
                <div className="mlc-right">
                  <span className="mlc-duration">{lesson.duration}</span>
                  <Icon name="ChevronRight" size={16}/>
                </div>
              </button>
            );
          })}
        </div>
      </section>
    </main>
  );
}

// ── Lesson Page ─────────────────────────────────────────────────────────
const TABS = [{id:'overview',label:'Overview',icon:'FileText'},{id:'explanation',label:'Deep Dive',icon:'BookOpen'},{id:'timestamps',label:'Timestamps',icon:'Clock'},{id:'transcript',label:'Transcript',icon:'AlignLeft'}];

function LessonPage({lesson,allLessons,isComplete,markComplete,markIncomplete,onNavigate}) {
  const [activeTab, setActiveTab] = useState('overview');
  if (!lesson) return null;
  const idx = allLessons.findIndex(l=>l.id===lesson.id);
  const prev = idx > 0 ? allLessons[idx-1] : null;
  const next = idx < allLessons.length-1 ? allLessons[idx+1] : null;
  const done = isComplete(lesson.id);

  return (
    <main className="lesson-page">
      <div className="breadcrumb">
        <button className="breadcrumb-link" onClick={()=>onNavigate('dashboard')}>Course Home</button>
        <span className="bc-sep"><Icon name="ChevronRight" size={14}/></span>
        <button className="breadcrumb-link" onClick={()=>onNavigate('module',lesson.module_id)}>{lesson.module_id}</button>
        <span className="bc-sep"><Icon name="ChevronRight" size={14}/></span>
        <span className="breadcrumb-current">{lesson.id}</span>
      </div>

      <div className="lesson-header">
        <div className="lesson-id-row">
          <span className="lesson-module-badge">{lesson.module_id}</span>
          <span className="lesson-video-badge">Video {lesson.video_number}</span>
          {done && <span className="lesson-done-badge"><Icon name="CheckCircle" size={12}/>Completed</span>}
        </div>
        <h1 className="lesson-title">{lesson.title}</h1>
        <div className="lesson-meta">
          <span className="lmeta-chip"><Icon name="Clock" size={13}/>{lesson.duration}</span>
          <a href={lesson.youtube_url} target="_blank" rel="noopener noreferrer" className="lmeta-chip lmeta-link">
            <Icon name="ExternalLink" size={13}/>Watch on YouTube
          </a>
        </div>
      </div>

      <div className="video-container">
        <iframe src={`https://www.youtube.com/embed/${lesson.youtube_id}?rel=0&modestbranding=1`} title={lesson.title} allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowFullScreen className="video-iframe"/>
      </div>

      <div className="lesson-complete-row">
        <button className={`mark-complete-btn ${done?'mark-complete-btn--done':''}`} onClick={()=>done?markIncomplete(lesson.id):markComplete(lesson.id)}>
          <Icon name="CheckCircle" size={16}/>{done?'Mark as Incomplete':'Mark as Complete'}
        </button>
        <div className="lesson-nav-inline">
          {prev && <button className="nav-inline-btn" onClick={()=>onNavigate('lesson',prev.id)}><Icon name="ChevronLeft" size={14}/>Previous</button>}
          {next && <button className="nav-inline-btn nav-inline-btn--next" onClick={()=>onNavigate('lesson',next.id)}>Next<Icon name="ChevronRight" size={14}/></button>}
        </div>
      </div>

      <div className="content-tabs">
        {TABS.map(tab=>(
          <button key={tab.id} className={`content-tab ${activeTab===tab.id?'content-tab--active':''}`} onClick={()=>setActiveTab(tab.id)}>
            <Icon name={tab.icon} size={14}/>{tab.label}
          </button>
        ))}
      </div>

      <div className="tab-panel">
        {activeTab==='overview' && (
          <>
            <div className="content-block">
              <h3 className="content-block-title"><Icon name="Lightbulb" size={16}/>Lesson Summary</h3>
              <p className="lesson-summary-text">{lesson.summary}</p>
            </div>
            <div className="content-block">
              <h3 className="content-block-title"><Icon name="FileText" size={16}/>About This Lesson</h3>
              <p className="lesson-description-text">{lesson.description}</p>
            </div>
            <div className="content-block">
              <h3 className="content-block-title"><Icon name="List" size={16}/>Key Takeaways</h3>
              <ul className="takeaways-list">
                {lesson.key_takeaways.map((t,i)=>(
                  <li key={i} className="takeaway-item"><span className="takeaway-num">{String(i+1).padStart(2,'0')}</span><span>{t}</span></li>
                ))}
              </ul>
            </div>
          </>
        )}
        {activeTab==='explanation' && (
          <div className="content-block">
            <h3 className="content-block-title"><Icon name="BookOpen" size={16}/>Comprehensive Explanation</h3>
            <div className="explanation-text">
              {lesson.comprehensive_explanation.split('\n\n').map((p,i)=>(
                <p key={i} className="explanation-para">{p}</p>
              ))}
            </div>
          </div>
        )}
        {activeTab==='timestamps' && (
          <div className="content-block">
            <h3 className="content-block-title"><Icon name="Clock" size={16}/>Video Timestamps</h3>
            <div className="timestamps-list">
              {lesson.timestamps.map((ts,i)=>(
                <a key={i} href={`${lesson.youtube_url}&t=${ts.time.replace(':','m')}s`} target="_blank" rel="noopener noreferrer" className="timestamp-item">
                  <span className="ts-time">{ts.time}</span>
                  <span className="ts-label">{ts.label}</span>
                  <span className="ts-icon"><Icon name="ExternalLink" size={12}/></span>
                </a>
              ))}
            </div>
          </div>
        )}
        {activeTab==='transcript' && (
          <div className="content-block">
            <h3 className="content-block-title"><Icon name="AlignLeft" size={16}/>Lesson Transcript</h3>
            <div className="transcript-text">
              {lesson.transcript_clean.split('\n\n').map((p,i)=>(
                <p key={i} className="transcript-para">{p}</p>
              ))}
              <div className="transcript-fade"><span className="transcript-truncated">Full transcript available in the AI Tutor →</span></div>
            </div>
          </div>
        )}
      </div>

      <div className="lesson-nav-bottom">
        <div className="nav-bottom-prev">
          {prev && (
            <button className="nav-bottom-btn" onClick={()=>onNavigate('lesson',prev.id)}>
              <Icon name="ChevronLeft" size={16}/><div><div className="nav-btn-label">Previous Lesson</div><div className="nav-btn-title">{prev.title}</div></div>
            </button>
          )}
        </div>
        <div className="nav-bottom-next">
          {next ? (
            <button className="nav-bottom-btn nav-bottom-btn--next" onClick={()=>onNavigate('lesson',next.id)}>
              <div style={{textAlign:'right'}}><div className="nav-btn-label">Next Lesson</div><div className="nav-btn-title">{next.title}</div></div><Icon name="ChevronRight" size={16}/>
            </button>
          ) : (
            <button className="nav-bottom-btn nav-bottom-btn--complete nav-bottom-btn--next" onClick={()=>onNavigate('module',lesson.module_id)}>
              <div style={{textAlign:'right'}}><div className="nav-btn-label">Module Complete</div><div className="nav-btn-title">Back to Module Overview</div></div><Icon name="CheckCircle" size={16}/>
            </button>
          )}
        </div>
      </div>
    </main>
  );
}

// ── App ─────────────────────────────────────────────────────────────────
function App() {
  const [view, setView] = useState('dashboard');
  const [activeId, setActiveId] = useState(null);
  const [aiOpen, setAiOpen] = useState(false);
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [searchQuery, setSearchQuery] = useState('');
  const {markComplete,markIncomplete,isComplete,overallPercent,completedCount,totalLessons,moduleStats,nextLesson} = useProgress(courseData);
  const allLessons = useMemo(() => courseData.modules.flatMap(m=>m.lessons), []);
  const activeLesson = useMemo(() => allLessons.find(l=>l.id===activeId)||null, [allLessons,activeId]);
  const activeModule = useMemo(() => courseData.modules.find(m=>m.id===activeId)||null, [activeId]);
  const activeModuleStats = useMemo(() => { if(!activeModule) return null; const i=courseData.modules.findIndex(m=>m.id===activeId); return moduleStats[i]||null; }, [activeModule,activeId,moduleStats]);

  const navigate = (v, id=null) => {
    setView(v); setActiveId(id); setSidebarOpen(false);
    window.scrollTo({top:0,behavior:'smooth'});
  };

  return (
    <div className="app-layout">
      {sidebarOpen && <div className="sidebar-overlay" onClick={()=>setSidebarOpen(false)}/>}
      <div className={`sidebar-wrapper ${sidebarOpen?'sidebar-wrapper--open':''}`}>
        <Sidebar courseData={courseData} currentLessonId={view==='lesson'?activeId:null} isComplete={isComplete} onNavigate={navigate} onModuleClick={id=>navigate('module',id)} currentView={view} searchQuery={searchQuery} onSearchChange={setSearchQuery}/>
      </div>
      <div className="main-wrapper">
        <header className="mobile-header">
          <button className="mobile-menu-btn" onClick={()=>setSidebarOpen(!sidebarOpen)}><Icon name={sidebarOpen?"X":"Menu"} size={20}/></button>
          <div className="mobile-brand">byScript <span>Academy</span></div>
        </header>
        <div className="page-content">
          {view==='dashboard' && <Dashboard courseData={courseData} overallPercent={overallPercent} completedCount={completedCount} totalLessons={totalLessons} moduleStats={moduleStats} nextLesson={nextLesson} onNavigate={navigate} searchQuery={searchQuery} onSearchChange={setSearchQuery}/>}
          {view==='module' && activeModule && <ModulePage module={activeModule} moduleStats={activeModuleStats} isComplete={isComplete} onNavigate={navigate}/>}
          {view==='lesson' && activeLesson && <LessonPage lesson={activeLesson} allLessons={allLessons} isComplete={isComplete} markComplete={markComplete} markIncomplete={markIncomplete} onNavigate={navigate}/>}
        </div>
      </div>
      <AITutorFAB onClick={()=>setAiOpen(true)}/>
      {aiOpen && <AITutorModal onClose={()=>setAiOpen(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
